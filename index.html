<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CDO Onboarding Plans</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230f172a'/><text x='32' y='42' text-anchor='middle' font-size='26' fill='%236366f1'>O</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{text-align:center;padding:40px}
.badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:rgba(99,102,241,.15);color:#818cf8;padding:6px 16px;border-radius:99px;margin-bottom:24px}
h1{font-size:36px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
p{font-size:16px;color:#94a3b8;margin-bottom:40px}
.cards{display:flex;gap:24px;justify-content:center;flex-wrap:wrap}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:32px 28px;width:280px;text-align:left;transition:all .2s;text-decoration:none;color:inherit}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4);border-color:#475569}
.avatar{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;margin-bottom:16px}
.card:first-child .avatar{background:linear-gradient(135deg,#4338ca,#6366f1)}
.card:last-child .avatar{background:linear-gradient(135deg,#6d28d9,#7c3aed)}
.card h2{font-size:18px;font-weight:700;margin-bottom:4px}
.card .role{font-size:13px;color:#94a3b8;margin-bottom:12px}
.card .start{font-size:12px;color:#64748b;display:flex;align-items:center;gap:6px}
.card .start strong{color:#cbd5e1}
.arrow{font-size:13px;color:#6366f1;font-weight:600;margin-top:16px;display:block}
</style>
</head>
<body>
<div class="wrap">
  <div class="badge">Corporate Data & AI Office</div>
  <h1>Onboarding Plans</h1>
  <p>30-day interactive onboarding plans for new team members</p>
  <div class="cards">
    <a class="card" href="adam-maki.html">
      <div class="avatar">AM</div>
      <h2>Adam Maki</h2>
      <div class="role">Project Manager — MDM, Finance</div>
      <div class="start">Start Date: <strong>March 23, 2026</strong></div>
      <span class="arrow">Open plan →</span>
    </a>
    <a class="card" href="asia-lewis.html">
      <div class="avatar">AL</div>
      <h2>Asia Lewis</h2>
      <div class="role">Project Analyst — Programs & Operations</div>
      <div class="start">Start Date: <strong>March 23, 2026</strong></div>
      <span class="arrow">Open plan →</span>
    </a>
  </div>
</div>
</body>
</html>
